name: deepzip_env
# Reproduces DeepZip (DCC 2019).
# Original README pins TensorFlow 1.8 + Keras 2.2.2 — those wheels only exist
# for Python ≤3.7.
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.7
  - pip
  - numpy<1.20
  - scikit-learn
  - pip:
      - tensorflow-gpu==1.15.5   # closest stable wheel; original was 1.8
      - keras==2.2.4
